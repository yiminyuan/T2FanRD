[Fan1]
auto=true

[Fan2]
auto=false
low_temp=60
high_temp=100
speed_curve=exponential
always_full_speed=false
sensors=slot:1
exp_pow=3.0

[Fan3]
auto=false
low_temp=60
high_temp=100
speed_curve=exponential
always_full_speed=false
# slot:3 = AMD MPX dies (hwmon); slot:5 = NVIDIA add-in GPU (NVML). This fan
# tracks the hottest of all three. low/high are junction (hotspot) temps.
sensors=slot:3,slot:5
exp_pow=3.0

[Fan4]
auto=false
low_temp=55
high_temp=80
speed_curve=exponential
always_full_speed=false
sensors=cpu
