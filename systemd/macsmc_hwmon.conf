# Enable manual fan control in the macsmc-hwmon driver. Required by t2fanrd:
# without it, fanN_target is created read-only at module probe time and the
# daemon cannot drive the fans.
#
# This is the kernel's "unsafe" fan-control knob. While t2fanrd runs it
# supplies the fan curve; if the daemon dies and cannot be restarted, fans
# stay at their last target with no SMC fallback (Restart=always covers
# transient crashes, and a config error fails before manual is engaged).
#
# Install to /etc/modprobe.d/macsmc_hwmon.conf, then reload the module
# (sudo modprobe -r macsmc_hwmon; sudo modprobe macsmc_hwmon) or reboot.
options macsmc_hwmon fan_control=1
